name: Bug report
description: Report something that's not working as documented
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug report. The fields below help me reproduce
        what you're seeing without a back-and-forth. pdf-merger runs entirely
        in your browser, so the browser, OS, and the kind of PDF matter most.

        Please **do not attach real personal PDFs** (payslips, statements) —
        describe the file instead, or attach a non-sensitive sample that
        reproduces the issue.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What did you observe? What did you expect instead?
      placeholder: |
        I dropped three PDFs and clicked Merge, but the downloaded file only
        had the first two. Expected all three.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: How to reproduce
      description: Minimum steps. What files (count, size, encrypted?), what order, what did you click?
      placeholder: |
        1. Open https://pdf-merger.lepaux.com
        2. Drop a.pdf (2 pages), b.pdf (1 page, owner-password), c.pdf (1 page)
        3. Click "Merge 3 PDFs"
        4. Downloaded merged.pdf has only a.pdf + c.pdf
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser & version
      description: e.g. from the browser's "About" screen.
      placeholder: "Firefox 128 / Chrome 127 / Safari 17.5"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "macOS 15 / Windows 11 / Ubuntu 24.04 / iOS 18"
    validations:
      required: true

  - type: dropdown
    id: source
    attributes:
      label: Where are you running it
      options:
        - Hosted site (pdf-merger.lepaux.com)
        - Local dev (npm run dev)
        - Local static build (npm run preview)
        - Other (specify in 'How to reproduce')
    validations:
      required: true

  - type: textarea
    id: console
    attributes:
      label: Browser console output
      description: |
        Open the developer tools console (F12), reproduce, and paste any
        errors or warnings. Optional but very helpful.
      render: shell
